version: '3.8'

services:
  video-downloader:
    build: .
    container_name: video-downloader
    ports:
      - "8001:8001"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY:-}
      - PROXY_URL=${PROXY_URL:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8001}
      - VIP_EMAIL=${VIP_EMAIL:-}
      - VIP_PASSWORD=${VIP_PASSWORD:-}
    volumes:
      - ./data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3